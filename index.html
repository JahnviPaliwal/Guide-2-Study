<script>
/* =========================================================
   ROW HELPERS
   ========================================================= */
function T(c,i,ex,u,g){ return {c,i,ex,u,g}; }          // concept: name, idea, example, use-case, gotcha
function Md(m,sig,desc,ex){ return {m,sig,desc,ex}; }   // method/function: name, signature, description, example
function Exc(name,when,ex){ return {name,when,ex}; }     // exception: name, raised-when, example
function O(op,list,dict,set,note){ return {op,list,dict,set,note}; } // big-O row
function G(scenario,pick){ return {scenario,pick}; }      // decision guide row
function Sy(s,cause){ return {s,cause}; }                 // symptom row

/* =========================================================
   DATA — GROUP 1: FUNDAMENTALS & SYNTAX
   ========================================================= */
const F_TYPES = [
T("int","Whole numbers, arbitrary precision.","x = 5","Counting, indexing, arithmetic","`/` always returns a float — use `//` for integer division"),
T("float","Decimal numbers, IEEE-754 double precision.","x = 5.0","Measurements, calculations needing decimals","0.1 + 0.2 != 0.3 exactly — binary floats can't represent most decimals precisely"),
T("str","Immutable sequence of Unicode characters.","x = 'hi'","Text data","Every 'modification' creates a brand new string object"),
T("bool","True / False — actually a subclass of int (True == 1).","x = True","Conditions, flags","bool([]) is False but bool([0]) is True — container truthiness depends on length, not content"),
T("complex","Numbers with a real and imaginary part.","x = 2 + 3j","Scientific/engineering computation","Rarely seen outside specialized numeric code"),
T("NoneType","Represents the absence of a value.","x = None","Default/sentinel values, 'no result'","Always compare with `is None`, never `== None`"),
T("Type conversion","Explicit casting between types.","int('5'), str(5), float('3.2')","Parsing input, converting between representations","int('5.5') raises ValueError — convert to float first, then int() if you need to truncate"),
];
const F_OPS = [
T("Arithmetic","+ − * / // % **","7 // 2 = 3, 7 % 2 = 1, 2**3 = 8","Standard math operations","`**` is exponentiation, not XOR (that's `^`, a bitwise op)"),
T("Comparison","== != > < >= <=","3 == 3.0 → True","Comparing values","Chained comparisons work: 1 < x < 10 (unlike most C-family languages)"),
T("Logical","and or not","True and False → False","Boolean logic, conditions","`and`/`or` short-circuit and return one of the actual operands, not just True/False"),
T("Bitwise","& | ^ ~ << >>","5 & 3 = 1, 5 << 1 = 10","Low-level flag manipulation, bit masks","`~x` equals `-x-1`, which surprises people expecting a simple bit-flip on the printed value"),
T("Identity","is, is not","a is b","Checking whether two names point to the same object","Small ints/strings may be cached — `is` can misleadingly look correct for value comparison"),
T("Membership","in, not in","'a' in 'cat' → True","Checking containment in a sequence/collection","On a list, `in` is O(n); use a set or dict for O(1) membership checks"),
T("Walrus operator",":=","if (n := len(data)) > 10: ...","Assign and use a value in the same expression (3.8+)","Easy to overuse — hurts readability when nested too deeply"),
];
const F_CONTROL = [
T("if / elif / else","Branch based on conditions.","if x>0: pos() elif x==0: zero() else: neg()","All conditional logic","Indentation defines the block — mixing tabs and spaces raises TabError"),
T("for loop","Iterate over any iterable (not a C-style counter loop).","for i in range(5): ...","Looping over sequences, ranges, dict items, files, generators","`for ... else` runs the else only if the loop completed without a `break`"),
T("while loop","Repeat while a condition stays true.","while x < 10: x += 1","Looping until a condition changes, polling, retries","Forgetting to update the condition variable causes an infinite loop"),
T("break / continue","Exit the loop early / skip straight to the next iteration.","if x == 5: break","Early exit, skipping invalid items","`break` only exits the innermost loop — no labeled breaks in Python"),
T("match-case (3.10+)","Structural pattern matching.","match cmd: case 'go': start() case _: ignore()","Replacing long if/elif chains, destructuring data","Requires Python ≥3.10; `case _` is the wildcard/default branch"),
T("Ternary expression","Inline conditional expression.","y = 'even' if x % 2 == 0 else 'odd'","Short conditional assignment","Nesting ternaries inside each other kills readability fast"),
];
const F_STRINGFMT = [
T("f-strings (3.6+)","Embed expressions directly inside a string literal.","f\"{name} is {age}\"","The default choice for almost all string formatting","f-string expressions couldn't contain backslashes before 3.12"),
T(".format()","Format using {} placeholders.","\"{} is {}\".format(name, age)","Older formatting style, still common in existing code","More verbose than f-strings for simple cases"),
T("% formatting","Legacy C-style string formatting.","\"%s is %d\" % (name, age)","Maintaining old code that already uses it","Considered outdated — avoid it in new code"),
T("Format specs","Control width, precision, alignment, thousands separators.","f\"{pi:.2f}\", f\"{x:>10}\", f\"{n:,}\"","Display formatting of numbers/text","`:.2f` only changes the *display* — the underlying value is unrounded"),
];
const F_IO = [
T("print()","Write to standard output.","print(a, b, sep=', ', end='\\n')","Debugging, displaying results to the user","Output may be buffered when piped to a file/another process, not shown immediately"),
T("input()","Read one line of text from standard input.","name = input('Name: ')","Simple interactive command-line programs","Always returns a str — cast manually for numbers, e.g. int(input())"),
];
const F_STYLE = [
T("# comment","A single-line comment.","# explains the next line","Inline notes for future readers","Comments restating *what* the code does add noise — explain *why* instead"),
T("\"\"\"docstring\"\"\"","A documentation string for a module, class, or function.","def f():\\n    \"\"\"Does X.\"\"\"","API documentation, surfaced by help() and IDEs","Stored in the object's __doc__ attribute — readable at runtime"),
T("PEP 8","Python's official style guide.","4-space indents, snake_case names, max ~79-99 col lines","Consistent, readable code across a team/project","Not enforced by the interpreter — only by linters like flake8/black/ruff"),
];

/* =========================================================
   DATA — GROUP 2: DATA STRUCTURES
   ========================================================= */
const D_LIST = [
Md("append","list.append(x)","Add a single item to the end","[1,2].append(3) → [1,2,3]"),
Md("extend","list.extend(iterable)","Add every item from an iterable","[1].extend([2,3]) → [1,2,3]"),
Md("insert","list.insert(i, x)","Insert an item at a specific index","[1,3].insert(1,2) → [1,2,3]"),
Md("remove","list.remove(x)","Remove the first matching value (raises ValueError if absent)","[1,2,1].remove(1) → [2,1]"),
Md("pop","list.pop(i=-1)","Remove and return the item at index (default: last)","[1,2,3].pop() → 3"),
Md("sort","list.sort(key=None, reverse=False)","Sort the list in place","[3,1,2].sort() → [1,2,3]"),
Md("sorted()","sorted(iterable, key=None, reverse=False)","Return a NEW sorted list, leaving the original untouched","sorted([3,1,2]) → [1,2,3]"),
Md("reverse","list.reverse()","Reverse the list in place","[1,2,3].reverse() → [3,2,1]"),
Md("index","list.index(x)","Find the first index of a value (raises ValueError if absent)","[1,2,3].index(2) → 1"),
Md("count","list.count(x)","Count occurrences of a value","[1,1,2].count(1) → 2"),
Md("Slicing","seq[start:stop:step]","Extract a sub-sequence (works on lists, tuples, strings)","[0,1,2,3,4][1:4:2] → [1,3]"),
Md("List comprehension","[expr for x in it if cond]","Build a list concisely in one line","[x*x for x in range(5) if x%2==0] → [0,4,16]"),
];
const D_TUPLE = [
T("Tuple","Immutable, ordered sequence.","t = (1,2,3)","Fixed collections, dict keys, function returns that shouldn't change","A 1-element tuple needs a trailing comma: (1,) — (1) is just the int 1"),
T("Packing / Unpacking","Assign or extract multiple values at once.","a, b = 1, 2  |  a, *rest = [1,2,3]","Swapping variables, multiple return values, variadic unpacking","Mismatched unpacking lengths raise ValueError"),
T("namedtuple","A tuple subclass with named fields.","Point = namedtuple('Point', ['x','y'])","Lightweight, immutable, self-documenting records","Still positional under the hood — field order matters at construction"),
];
const D_DICT = [
Md("get","dict.get(key, default=None)","Safe lookup that never raises KeyError","{'a':1}.get('b', 0) → 0"),
Md("setdefault","dict.setdefault(key, default)","Get a value, inserting the default first if the key is missing","d.setdefault('a', []).append(1)"),
Md("update","dict.update(other)","Merge another dict (or key-value pairs) into this one","d.update({'b':2})"),
Md("pop","dict.pop(key, default)","Remove and return the value for a key","d.pop('a', None)"),
Md("items / keys / values","dict.items(), .keys(), .values()","Iterable, live views over the dict's contents","for k, v in d.items(): ..."),
Md("Dict comprehension","{k: v for k, v in it}","Build a dict concisely in one line","{x: x*x for x in range(5)}"),
Md("Merge operator (3.9+)","d1 | d2","Merge two dicts into a brand-new dict","{'a':1} | {'b':2} → {'a':1,'b':2}"),
];
const D_SET = [
Md("add / remove / discard","set.add(x), .remove(x), .discard(x)","Add or remove items (discard never raises if missing)","{1,2}.add(3) → {1,2,3}"),
Md("union / intersection","a | b, a & b","Combine sets, or find elements common to both","{1,2}|{2,3} → {1,2,3}"),
Md("difference / symmetric_difference","a - b, a ^ b","Elements only in one set / not shared by both","{1,2}-{2} → {1}"),
Md("Set comprehension","{expr for x in it}","Build a set concisely — automatically deduplicates","{x%3 for x in range(10)} → {0,1,2}"),
Md("frozenset","frozenset(iterable)","An immutable, hashable set","Usable as a dict key or as an element inside another set"),
];
const D_STR = [
Md("split / rsplit","str.split(sep=None, maxsplit=-1)","Break a string into a list of substrings","'a,b,c'.split(',') → ['a','b','c']"),
Md("join","sep.join(iterable)","Combine strings with a separator between them","','.join(['a','b']) → 'a,b'"),
Md("strip / lstrip / rstrip","str.strip(chars=None)","Remove leading/trailing whitespace (or given characters)","'  hi  '.strip() → 'hi'"),
Md("replace","str.replace(old, new, count=-1)","Replace occurrences of a substring","'aaa'.replace('a','b',2) → 'bba'"),
Md("find / index","str.find(sub) / str.index(sub)","Locate a substring (find → -1 if absent, index → ValueError)","'hello'.find('l') → 2"),
Md("upper / lower / title / capitalize","str.upper() etc.","Case conversion","'hi'.upper() → 'HI'"),
Md("startswith / endswith","str.startswith(prefix)","Check a prefix or suffix","'file.py'.endswith('.py') → True"),
Md("encode / decode","str.encode(enc), bytes.decode(enc)","Convert between text (str) and bytes","'hi'.encode('utf-8') → b'hi'"),
];
const D_COMPREHENSIONS = [
T("List comprehension","[expr for x in it]","Eager — builds the entire list in memory immediately","Need the full collection right away","Can use a lot of memory if `it` is very large"),
T("Set comprehension","{expr for x in it}","Eager, automatically deduplicating","Need unique values from a sequence","Resulting order is not guaranteed/meaningful"),
T("Dict comprehension","{k: v for x in it}","Eager, produces key-value pairs","Building lookup tables from a sequence","Duplicate keys silently overwrite earlier ones — last one wins"),
T("Generator expression","(expr for x in it)","Lazy — produces one item at a time, on demand","Large/streaming data, one-time use, piping into sum()/any()/etc.","Can only be iterated once; doesn't support len() or indexing"),
];
const D_MUTABILITY = [
T("Mutable types","list, dict, set, and most custom objects.","Contents can change after creation without creating a new object","When you need to modify in place efficiently","Sharing a mutable object across two variables means changes via either are visible through both"),
T("Immutable types","int, float, str, tuple, frozenset, bool.","Cannot change after creation — any 'modification' produces a new object","Hashable dict keys/set elements, safe sharing across threads","`s += 'x'` on a string silently rebuilds the entire string each time"),
T("Shallow copy","copy.copy(x), or x[:], or list(x)","Copies only the outer container — nested objects are still shared","Copying a flat (non-nested) structure","Mutating a nested list inside a shallow copy still affects the original"),
T("Deep copy","copy.deepcopy(x)","Recursively copies every nested object too","Need a fully independent copy of a nested structure","Slower, and can fail on objects holding live resources (open files, sockets)"),
T("Mutable default argument","A classic Python pitfall.","def f(x=[]): x.append(1); return f","Never — this demonstrates what NOT to do","The default list is created once at def-time and shared across every call — use `x=None` and create fresh inside"),
];

/* =========================================================
   DATA — GROUP 3: FUNCTIONS & FUNCTIONAL PROGRAMMING
   ========================================================= */
const FN_BASICS = [
T("Positional args","Matched to parameters by order.","def f(a,b): ...","The simple, common case","Easy to mix up argument order with many parameters"),
T("Keyword args","Matched to parameters by name.","f(b=2, a=1)","Clarity when a function has many parameters","Positional args must come before keyword args at the call site"),
T("Default args","A fallback value used when the caller omits the argument.","def f(a, b=10): ...","Optional parameters with sensible defaults","Defaults are evaluated once, at def-time — see the mutable default gotcha"),
T("*args","Collects extra positional arguments into a tuple.","def f(*args): ...","Variable-length positional input (e.g. a custom print())","args is a tuple, not a list — convert it if you need in-place sorting etc."),
T("**kwargs","Collects extra keyword arguments into a dict.","def f(**kwargs): ...","Variable-length named input, flexible/extensible APIs","Keys must be valid Python identifiers"),
T("Positional-only / Keyword-only","`/` and `*` markers inside the signature.","def f(a, b, /, c, *, d): ...","Strict, explicit, future-proof public APIs (3.8+)","Easy to forget how `/` and `*` change what's allowed at the call site"),
T("Type annotations","Optional type hints on parameters and return value.","def f(x: int) -> str: ...","Documentation and static analysis (mypy, IDEs)","NOT enforced at runtime by default — purely advisory unless you add your own checks"),
];
const FN_LAMBDA = [
T("lambda","An anonymous, single-expression function.","square = lambda x: x*x","Short, throwaway functions — especially as a sort/filter key","Can't contain statements: no assignment, no multi-line logic, no `if` blocks (only ternary expressions)"),
T("Higher-order function","A function that takes and/or returns other functions.","sorted(data, key=lambda x: x[1])","Customizing the behavior of built-ins (sorted, map, filter)","Overusing lambdas where a named function would be clearer hurts debuggability"),
];
const FN_SCOPE = [
T("LEGB rule","Name lookup order: Local → Enclosing → Global → Built-in.","A name found locally short-circuits the search outward","Understanding why a variable resolves the way it does","Shadowing a built-in name (e.g. `list = [1,2]`) hides the real builtin for the rest of that scope"),
T("global","Modify a module-level variable from inside a function.","def f(): global x; x = 1","Rare — intentionally mutating global/module state","Overusing `global` makes code hard to test and reason about"),
T("nonlocal","Modify a variable in an enclosing (non-global) function scope.","def outer(): x=1; def inner(): nonlocal x; x=2","Closures that need to mutate the enclosing function's state","Without `nonlocal`, assignment just creates a brand-new local variable instead"),
T("Closure","An inner function that 'remembers' variables from its enclosing scope.","def make_adder(n): return lambda x: x+n","Factories, decorators, maintaining state between calls","Late-binding: closures created in a loop all capture the *variable*, not its value at creation time"),
];
const FN_DECORATORS = [
T("Basic decorator","A function that wraps another function to extend its behavior.","def deco(f): def wrap(*a,**k): return f(*a,**k); return wrap","Logging, timing, access control, validation, caching","Forgetting functools.wraps loses the original function's __name__ and docstring"),
T("@syntax","Syntactic sugar for `f = deco(f)`.","@deco\\ndef f(): ...","Applying decorators cleanly and readably","Decorators execute at *def* time, not at call time"),
T("functools.wraps","Preserves the wrapped function's metadata on the wrapper.","@functools.wraps(f)\\ndef wrap(*a,**k): ...","Always, whenever you write a decorator","Skipping it breaks help(), introspection tools, and stacking with other decorators"),
T("Decorator with arguments","A 'decorator factory' — a function that returns a decorator.","def repeat(n): def deco(f): ...; return deco","Parameterized behavior, e.g. @repeat(3) or @retry(times=5)","Three nested function levels can be confusing — name each level clearly"),
T("Class decorators","Decorators applied to a class instead of a function.","@dataclass\\nclass Point: ...","Adding behavior or boilerplate to a class declaratively","Multiple stacked decorators apply bottom-up, closest to the class first"),
T("Stacking decorators","Applying more than one decorator to a single function.","@deco1\\n@deco2\\ndef f(): ...","Composing independent pieces of behavior","Applied bottom-up: deco2 wraps f first, then deco1 wraps the result of that"),
];
const FN_MAPFILTER = [
Md("map","map(func, iterable)","Apply a function to every item — returns a lazy iterator","list(map(str, [1,2,3])) → ['1','2','3']"),
Md("filter","filter(func, iterable)","Keep only items where func returns a truthy value","list(filter(lambda x: x>0, [-1,0,1])) → [1]"),
Md("functools.reduce","reduce(func, iterable, initial)","Cumulatively combine all items into a single value","reduce(lambda a,b: a+b, [1,2,3]) → 6"),
Md("sorted with key","sorted(it, key=func, reverse=False)","Custom sort order based on a derived value","sorted(words, key=len)"),
Md("min/max with key","min(it, key=func)","Find the extreme item by a custom criterion","min(people, key=lambda p: p.age)"),
];
const FN_ITERTOOLS = [
Md("chain","itertools.chain(*iterables)","Flatten several iterables into one continuous stream","chain([1,2],[3,4]) → 1,2,3,4"),
Md("islice","itertools.islice(it, stop) or (it, start, stop, step)","Slice a lazy iterator without materializing the whole thing","islice(count(), 5) → 0,1,2,3,4"),
Md("groupby","itertools.groupby(it, key=None)","Group consecutive items that share a key","Input must already be sorted by that key to group correctly"),
Md("product","itertools.product(*iterables, repeat=1)","Cartesian product — like nested for-loops, flattened","product([1,2],['a','b']) → (1,'a'),(1,'b'),(2,'a'),(2,'b')"),
Md("permutations / combinations","itertools.permutations(it,r) / combinations(it,r)","All orderings / all r-sized selections","combinations([1,2,3],2) → (1,2),(1,3),(2,3)"),
Md("cycle","itertools.cycle(it)","Repeat an iterable forever","Useful for round-robin assignment — must break out manually"),
Md("accumulate","itertools.accumulate(it, func=add)","Running totals (or a custom running combination)","accumulate([1,2,3]) → 1,3,6"),
Md("tee","itertools.tee(it, n=2)","Split one iterator into n independent iterators","Consuming from one doesn't advance the others"),
Md("zip_longest","itertools.zip_longest(*its, fillvalue=None)","Zip iterables of unequal length, padding the shorter ones","zip_longest([1,2],[1]) → (1,1),(2,None)"),
];
const FN_FUNCTOOLS = [

function esc(s){ return (s===undefined||s===null) ? "" : String(s); }

function renderConceptTable(rows){
  let head = "<tr><th>Concept</th><th>What it means</th><th>Example</th><th>When to use</th><th>Gotcha</th></tr>";
  let body = rows.map(r=>`<tr>
      <td class="concept">${esc(r.c)}</td>
      <td>${esc(r.i)}</td>
      <td><span class="codeline" style="margin-top:0">${esc(r.ex)}</span></td>
      <td>${esc(r.u)}</td>
      <td>${esc(r.g)}</td>
    </tr>`).join("");
  return `<div class="twrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

function buildDiagram(key, cap){
  return `<div class="diagram">${DIAG[key]}<div class="cap">${cap||""}</div></div>`;
}
function buildSub(sub){
  let html = `<div class="subsection" id="${sub.id}"><h3>${esc(sub.title)}</h3>`;
  if(sub.note) html += `<p class="note">${esc(sub.note)}</p>`;
  if(sub.diagram) html += buildDiagram(sub.diagram, sub.cap);
  if(sub.table) html += renderConceptTable(sub.table);
  if(sub.table2) html += renderMethodTable(sub.table2);
  if(sub.table3) html += renderExcTable(sub.table3);
  if(sub.table4) html += renderGuideTable(sub.table4);
  if(sub.table5) html += renderBigOTable(sub.table5);
  if(sub.table6) html += renderSymptomTable(sub.table6);
  html += `</div>`;
  return html;
}
function buildGroup(g){
  let html = `<section class="group" id="${g.id}"><h2>${esc(g.title)}</h2><p class="lede">${esc(g.lede)}</p>`;
  g.subs.forEach(s=> html += buildSub(s));
  if(g.callout) html += `<div class="callout">${g.callout}</div>`;
  html += `</section>`;
  return html;
}
document.getElementById("content").innerHTML = SECTIONS.map(buildGroup).join("");

let navHtml = "";
SECTIONS.forEach(g=>{
  navHtml += `<a class="toplink" href="#${g.id}">${esc(g.title)}</a>`;
  g.subs.forEach(s=> navHtml += `<a class="sublink" href="#${s.id}">${esc(s.title)}</a>`);
});
document.getElementById("navTree").innerHTML = navHtml;

document.getElementById("globalFilter").addEventListener("input", function(e){
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll("table tbody tr").forEach(tr=>{
    if(!q){ tr.classList.remove("row-hidden"); return; }
    const txt = tr.textContent.toLowerCase();
    tr.classList.toggle("row-hidden", !txt.includes(q));
  });
});
</script>
