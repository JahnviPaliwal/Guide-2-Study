<style>
  :root{
    --bg:#fbfaf8;
    --panel:#ffffff;
    --ink:#1f2424;
    --ink-soft:#5b6260;
    --line:#e3e0d8;
    --accent:#3d5a4f;
    --accent-soft:#e7eee9;
    --warn:#9a5b3a;
    --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Inter, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  body{display:flex; min-height:100vh;}
  a{color:var(--accent);}

  /* ---- sidebar ---- */
  #sidebar{
    width:230px; flex:0 0 230px;
    border-right:1px solid var(--line);
    background:var(--panel);
    position:sticky; top:0; height:100vh; overflow-y:auto;
    padding:20px 14px;
  }
  #sidebar h1{font-size:14px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); margin:0 0 14px 4px;}
  #sidebar nav a.toplink{
    display:block; padding:7px 8px; border-radius:6px; font-size:13.5px;
    color:var(--ink); text-decoration:none; font-weight:600; margin-top:6px;
  }
  #sidebar nav a.toplink:hover{background:var(--accent-soft);}
  #sidebar nav a.sublink{
    display:block; padding:4px 8px 4px 18px; border-radius:6px; font-size:12.5px;
    color:var(--ink-soft); text-decoration:none;
  }
  #sidebar nav a.sublink:hover{background:var(--accent-soft); color:var(--ink);}
  #sidebar input{
    width:100%; padding:7px 9px; margin-bottom:14px; border:1px solid var(--line);
    border-radius:6px; font-size:12.5px; font-family:var(--sans); background:#fff;
  }

  /* ---- main ---- */
  #main{flex:1; min-width:0; padding:38px 44px 80px; max-width:1180px;}
  .pagehead{margin-bottom:34px;}
  .pagehead h1{font-size:26px; margin:0 0 6px;}
  .pagehead p{color:var(--ink-soft); font-size:14px; margin:0; max-width:640px; line-height:1.5;}

  section.group{margin-bottom:56px;}
  section.group > h2{
    font-size:21px; border-bottom:2px solid var(--ink); padding-bottom:8px; margin-bottom:6px;
  }
  section.group > .lede{color:var(--ink-soft); font-size:13.5px; margin:0 0 22px; max-width:760px; line-height:1.5;}

  .subsection{margin:30px 0 38px;}
  .subsection h3{
    font-size:15px; margin:0 0 4px; color:var(--accent); letter-spacing:.01em;
  }
  .subsection .note{color:var(--ink-soft); font-size:12.5px; margin:0 0 12px;}

  /* table */
  .twrap{overflow-x:auto; border:1px solid var(--line); border-radius:8px;}
  table{width:100%; border-collapse:collapse; font-size:12.6px; min-width:860px;}
  td.viz{width:118px; padding:6px 8px;}
  .microviz{width:110px; height:62px; display:block;}
  thead th{
    text-align:left; background:#f1efe9; color:var(--ink-soft);
    font-size:11px; text-transform:uppercase; letter-spacing:.04em;
    padding:9px 12px; border-bottom:1px solid var(--line); position:sticky; top:0;
  }
  tbody td{padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:top; line-height:1.45;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#f7f6f1;}
  td.concept{font-weight:700; white-space:nowrap;}
  td .formula{display:block; font-family:var(--mono); font-size:11.5px; color:var(--warn); margin-top:3px;}
  td ul{margin:0; padding-left:16px;}
  td ul li{margin:2px 0;}
  .tag{display:inline-block; font-size:10.5px; padding:1px 7px; border-radius:10px; background:var(--accent-soft); color:var(--accent); margin-right:4px; white-space:nowrap;}

  .callout{
    background:var(--accent-soft); border-left:3px solid var(--accent);
    padding:12px 16px; font-size:13px; border-radius:0 6px 6px 0; margin:18px 0 8px; line-height:1.55;
  }
  .callout b{color:var(--accent);}

  .diagram{
    border:1px solid var(--line); border-radius:8px; background:#fff;
    padding:18px; margin:18px 0 28px; text-align:center;
  }
  .diagram .cap{font-size:12px; color:var(--ink-soft); margin-top:10px; text-align:left;}
  .diagram svg{max-width:100%; height:auto;}

  .quickgrid{display:grid; grid-template-columns:1fr 1fr; gap:0;}
  .quickgrid .twrap{min-width:0;}

  mark.row-hidden{display:none;}

  @media (max-width: 880px){
    #sidebar{display:none;}
    #main{padding:24px 16px 60px;}
    .quickgrid{grid-template-columns:1fr;}
  }
</style>

function esc(s){ return (s===undefined||s===null) ? "" : String(s); }

function renderMLTable(rows){
  let head = "<tr><th>Visual</th><th>Concept</th><th>Core idea</th><th>Pros / Cons</th><th>Best for</th><th>Failure modes</th><th>Data</th></tr>";
  let body = rows.map(r=>{
    let pc = (r.p!=="—"||r.n!=="—") ? `<ul>${r.p!=="—"?`<li>+ ${esc(r.p)}</li>`:""}${r.n!=="—"?`<li>− ${esc(r.n)}</li>`:""}</ul>` : "—";
    let fail = (r.fail!=="—"||r.under!=="—"||r.over!=="—") ? `<ul>${r.fail!=="—"?`<li><b>Fails:</b> ${esc(r.fail)}</li>`:""}${r.under!=="—"?`<li><b>Underfits:</b> ${esc(r.under)}</li>`:""}${r.over!=="—"?`<li><b>Overfits:</b> ${esc(r.over)}</li>`:""}</ul>` : "—";
    return `<tr>
      <td class="viz">${vizFor(r.c)}</td>
      <td class="concept">${esc(r.c)}</td>
      <td>${esc(r.i)}${r.f?`<span class="formula">${esc(r.f)}</span>`:""}</td>
      <td>${pc}</td>
      <td>${esc(r.u)}</td>
      <td>${fail}</td>
      <td><span class="tag">${esc(r.d)}</span></td>
    </tr>`;
  }).join("");
  return `<div class="twrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

  let head = "<tr><th>Visual</th><th>Concept</th><th>Formula</th><th>When / where to use</th><th>Related</th><th>Data type</th><th>Example</th></tr>";

      <td class="viz">${vizFor(r.c)}</td>

      <td>${esc(r.e)}</td>

  return `<div class="twrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

},
];

function buildDiagram(key, cap){
  return `<div class="diagram">${DIAG[key]}<div class="cap">${cap||""}</div></div>`;
}

function buildSub(sub){
  let html = `<div class="subsection" id="${sub.id}"><h3>${esc(sub.title)}</h3>`;
  if(sub.note) html += `<p class="note">${esc(sub.note)}</p>`;
  if(sub.diagram) html += buildDiagram(sub.diagram, sub.cap);
  if(sub.table) html += renderMLTable(sub.table);
  if(sub.table2) html += renderEnsembleTable(sub.table2);
  if(sub.table3) html += renderGuideTable(sub.table3);
  if(sub.table4) html += renderSymptomTable(sub.table4);
  if(sub.table5) html += renderStatsTable(sub.table5);
  if(sub.table6) html += renderMathTable(sub.table6);
  if(sub.table7) html += renderMapTable(sub.table7);
  html += `</div>`;
  return html;
}

function buildGroup(g){
  let html = `<section class="group" id="${g.id}"><h2>${esc(g.title)}</h2><p class="lede">${esc(g.lede)}</p>`;
  g.subs.forEach(s=> html += buildSub(s));
  if(g.callout) html += `<div class="callout">${g.callout}</div>`;
  html += `</section>`;
  return html;
}

document.getElementById("content").innerHTML = SECTIONS.map(buildGroup).join("");

// sidebar nav
let navHtml = "";
SECTIONS.forEach(g=>{
  navHtml += `<a class="toplink" href="#${g.id}">${esc(g.title)}</a>`;
  g.subs.forEach(s=> navHtml += `<a class="sublink" href="#${s.id}">${esc(s.title)}</a>`);
});
document.getElementById("navTree").innerHTML = navHtml;

// global filter — hides rows across all tables that don't match
document.getElementById("globalFilter").addEventListener("input", function(e){
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll("table tbody tr").forEach(tr=>{
    if(!q){ tr.classList.remove("row-hidden"); return; }
    const txt = tr.textContent.toLowerCase();
    tr.classList.toggle("row-hidden", !txt.includes(q));
  });
});
</script>
