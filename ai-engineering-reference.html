<style>
  :root{
    --bg:#fbfaf8; --panel:#ffffff; --ink:#1f2424; --ink-soft:#5b6260; --line:#e3e0d8;
    --accent:#3d5a4f; --accent-soft:#e7eee9; --warn:#9a5b3a;
    --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Inter, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  body{display:flex; min-height:100vh;}
  a{color:var(--accent);}
  code{font-family:var(--mono); font-size:11.6px; background:#f1efe9; padding:1px 5px; border-radius:4px; color:#2b3b35;}

  #sidebar{ width:250px; flex:0 0 250px; border-right:1px solid var(--line); background:var(--panel);
    position:sticky; top:0; height:100vh; overflow-y:auto; padding:20px 14px; }
  #sidebar h1{font-size:14px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); margin:0 0 14px 4px;}
  #sidebar nav a.toplink{ display:block; padding:7px 8px; border-radius:6px; font-size:13.2px; color:var(--ink); text-decoration:none; font-weight:600; margin-top:6px; }
  #sidebar nav a.toplink:hover{background:var(--accent-soft);}
  #sidebar nav a.sublink{ display:block; padding:4px 8px 4px 18px; border-radius:6px; font-size:12.2px; color:var(--ink-soft); text-decoration:none; }
  #sidebar nav a.sublink:hover{background:var(--accent-soft); color:var(--ink);}
  #sidebar input{ width:100%; padding:7px 9px; margin-bottom:14px; border:1px solid var(--line); border-radius:6px; font-size:12.5px; font-family:var(--sans); background:#fff; }

  #main{flex:1; min-width:0; padding:38px 44px 80px; max-width:1220px;}
  .pagehead{margin-bottom:34px;}
  .pagehead h1{font-size:26px; margin:0 0 6px;}
  .pagehead p{color:var(--ink-soft); font-size:14px; margin:0; max-width:700px; line-height:1.5;}

  section.group{margin-bottom:56px;}
  section.group > h2{font-size:21px; border-bottom:2px solid var(--ink); padding-bottom:8px; margin-bottom:6px;}
  section.group > .lede{color:var(--ink-soft); font-size:13.5px; margin:0 0 22px; max-width:800px; line-height:1.5;}

  .subsection{margin:30px 0 38px;}
  .subsection h3{font-size:15px; margin:0 0 4px; color:var(--accent); letter-spacing:.01em;}
  .subsection .note{color:var(--ink-soft); font-size:12.5px; margin:0 0 12px;}

  .twrap{overflow-x:auto; border:1px solid var(--line); border-radius:8px;}
  table{width:100%; border-collapse:collapse; font-size:12.6px; min-width:760px;}
  thead th{ text-align:left; background:#f1efe9; color:var(--ink-soft); font-size:11px; text-transform:uppercase;
    letter-spacing:.04em; padding:9px 12px; border-bottom:1px solid var(--line); position:sticky; top:0; }
  tbody td{padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:top; line-height:1.45;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#f7f6f1;}
  td.concept{font-weight:700; white-space:nowrap;}
  td .codeline{display:block; font-family:var(--mono); font-size:11.5px; color:var(--warn); margin-top:3px;}
  td ul{margin:0; padding-left:16px;}
  td ul li{margin:2px 0;}
  .tag{display:inline-block; font-size:10.5px; padding:1px 7px; border-radius:10px; background:var(--accent-soft); color:var(--accent); margin-right:4px; white-space:nowrap;}

  .callout{ background:var(--accent-soft); border-left:3px solid var(--accent); padding:12px 16px; font-size:13px;
    border-radius:0 6px 6px 0; margin:18px 0 8px; line-height:1.55; }
  .callout b{color:var(--accent);}

  .diagram{ border:1px solid var(--line); border-radius:8px; background:#fff; padding:18px; margin:18px 0 28px; text-align:center; }
  .diagram .cap{font-size:12px; color:var(--ink-soft); margin-top:10px; text-align:left;}
  .diagram svg{max-width:100%; height:auto;}

  mark.row-hidden{display:none;}

  @media (max-width: 880px){
    #sidebar{display:none;}
    #main{padding:24px 16px 60px;}
  }
</style>

<script>
function T(c,i,ex,u,g){ return {c,i,ex,u,g}; }
function Md(m,sig,desc,ex){ return {m,sig,desc,ex}; }
function G(scenario,pick){ return {scenario,pick}; }
function Sy(s,cause){ return {s,cause}; }

/* =========================================================
   GROUP 1 — GENERATIVE AI FOUNDATIONS
   ========================================================= */
const GEN_CORE = [
T("Token","The basic unit an LLM reads/writes — roughly ¾ of a word in English, via subword tokenization (e.g. BPE).","'unbelievable' → ['un','believ','able']","Understanding cost, context limits, and truncation","Token count differs by language — non-English/non-Latin text often costs 2-5x more tokens for the same meaning"),
T("Context window","The maximum number of tokens (input + output combined) a model can attend to in one call.","128K, 200K, 1M+ tokens depending on the model","Deciding whether to chunk/RAG vs. stuffing everything into the prompt","A huge context window doesn't guarantee the model 'notices' something buried in the middle of it — long-context recall is imperfect"),
T("Embedding","A dense vector representation of text (or other data) capturing semantic meaning.","'king' - 'man' + 'woman' ≈ 'queen' (geometrically)","Semantic search, RAG retrieval, clustering, classification","Embeddings from different models live in different vector spaces — never mix embeddings from two different embedding models in one index"),
T("Transformer / Attention","The architecture letting every token attend to every other token to build contextual meaning.","Self-attention computes relevance weights between all token pairs","Foundation of basically every modern LLM","See the Deep Learning reference for the full mechanics — this page treats transformers as the engine, not the focus"),
T("Autoregressive generation","The model predicts one token at a time, feeding each output back in as input for the next.","P(token_n | token_1...token_n-1)","Understanding why generation is sequential and can't be fully parallelized at inference","Errors compound — an early wrong token shifts everything generated afterward"),
T("Hallucination","The model generates fluent, confident-sounding text that's factually wrong or unsupported.","Citing a paper that doesn't exist, inventing an API method","The central reason RAG, grounding, and citations matter","Hallucination isn't a 'bug' to patch — it's an inherent consequence of next-token prediction without a built-in fact-checking step"),
T("Grounding","Constraining the model's output to be based on specific, provided source material.","Answer ONLY using the text in the context below","Reducing hallucination for factual/document-based tasks","Grounding reduces but doesn't eliminate hallucination — the model can still misread or extrapolate from the provided context"),
];
const GEN_SAMPLING = [
T("Temperature","Controls randomness in token selection — 0 is near-deterministic, higher values are more random/creative.","temperature=0 for factual Q&A, 0.7-1.0 for creative writing","Tuning the consistency vs. creativity trade-off","Temperature near 2.0 often produces incoherent text — most providers cap it well below the theoretical max for a reason"),
T("Top-p (nucleus sampling)","Samples only from the smallest set of tokens whose cumulative probability exceeds p.","top_p=0.9 keeps the most probable 90% of mass, discards the long tail","An alternative/complement to temperature for controlling diversity","Combining a very low top_p with a high temperature can produce contradictory, unpredictable behavior — most use one knob primarily, not both aggressively"),
T("Top-k","Restricts sampling to only the k most probable next tokens.","top_k=40","Hard-capping the candidate pool regardless of probability shape","Not supported/exposed by every provider's API (notably less common in some hosted chat APIs than top_p)"),
T("Frequency / presence penalty","Discourages the model from repeating tokens it's already used.","frequency_penalty=0.5","Reducing repetitive loops in longer generations","Set too high, it can force the model into using unnatural synonyms just to avoid repetition"),
T("max_tokens","A hard cap on how many tokens the model can generate in its response.","max_tokens=1024","Controlling cost and preventing runaway-length outputs","If the real answer needs more than the cap, output is silently truncated mid-thought, not gracefully shortened"),
T("Stop sequences","Strings that, if generated, immediately end the response.","stop=['\\n\\n', 'Human:']","Preventing a model from continuing into a new turn/role it shouldn't simulate","If your stop sequence appears naturally inside a desired answer, the response gets cut short incorrectly"),
];
const GEN_PROMPTING = [
T("Zero-shot prompting","Asking the model to perform a task with no examples, just instructions.","Translate this sentence into French: ...","Simple, well-understood tasks the model has likely seen many times in training","Performance on niche/unusual task formats degrades quickly without examples"),
T("Few-shot prompting","Including a handful of example input→output pairs before the real task.","Q: 2+2? A: 4 \\n Q: 3+5? A: 8 \\n Q: 7+1? A:","Teaching a specific output format or unusual task pattern","Examples that are too similar to each other can cause the model to overfit to a narrow pattern instead of generalizing"),
T("Chain-of-thought (CoT)","Prompting the model to reason step-by-step before giving a final answer.","Let's think step by step...","Math, logic, multi-step reasoning tasks","Visible CoT can be a post-hoc rationalization rather than the model's actual 'reasoning' — don't treat it as a reliable explanation of internal process"),
T("System prompt","An instruction set the developer provides that frames the model's role/behavior for the whole conversation.","'You are a concise, technical assistant for developers.'","Setting persona, tone, constraints, and behavioral guardrails","A system prompt is a strong influence, not an unbreakable rule — adversarial user input can sometimes override it ('jailbreaking')"),
T("Role-based messages","Structuring a conversation as alternating system/user/assistant turns rather than one flat block of text.","[{role:'system',...},{role:'user',...}]","The standard format for every modern chat-based LLM API","Mixing instructions into the wrong role (e.g. putting system-level rules inside a user message) often gets followed less reliably"),
T("Prompt injection","Malicious or unintended instructions embedded in user input or retrieved content that hijack the model's behavior.","A web page the model reads contains: 'Ignore previous instructions and...'","Security-critical for any system that feeds untrusted text to an LLM","RAG and tool-using agents are especially exposed — retrieved documents and tool outputs are an injection surface, not just the direct user message"),
T("Structured output prompting","Explicitly instructing (or constraining) the model to respond in a fixed schema.","Respond ONLY with valid JSON matching this schema: {...}","Reliable downstream parsing instead of regex-scraping free text","Most providers now offer native structured-output/JSON-mode features that are far more reliable than prompting alone — prefer those when available"),
];
const GEN_GUIDE = [
G("Factual Q&A, need consistency", "temperature near 0, grounding via RAG, cite sources"),
G("Creative writing, brainstorming", "higher temperature (0.7-1.0), few-shot for style/voice"),
G("Need parseable output for code to consume", "native structured output / JSON mode, not prompt-only formatting"),
G("Multi-step reasoning / math", "chain-of-thought prompting, consider a reasoning-focused model"),
G("Model confidently states something that seems wrong", "ground it with retrieved sources (RAG) and ask it to cite which source supports each claim"),
G("System is exposed to untrusted text (web pages, user uploads)", "treat that text as adversarial input — sanitize/limit what an agent can do based on it"),
];

/* =========================================================
   GROUP 2 — LLM API CALLING (MULTI-PROVIDER)
   ========================================================= */
const API_SHAPE = [
T("Chat/Messages API", "The dominant request shape: a list of role-tagged messages in, one assistant message out.", "POST /v1/chat/completions or /v1/messages", "Virtually every text-generation call to a hosted LLM today", "Each provider's message schema differs slightly (e.g. how system prompts are passed) — abstraction libraries like LangChain exist partly to paper over this"),
T("API key authentication", "A secret key sent in a header, identifying your account for billing and access.", "Authorization: Bearer sk-...  /  x-api-key: ...", "Every hosted LLM API call", "Never hardcode keys in source control — load from environment variables or a secrets manager"),
T("Streaming responses", "The model sends tokens back incrementally as they're generated, instead of waiting for the full response.", "stream=True, then iterate over server-sent events", "Responsive UIs (chat interfaces), long generations where users shouldn't stare at a blank screen", "Streamed responses are harder to validate/parse as structured output mid-stream — often you still buffer and parse once complete for anything beyond display"),
T("Tool / function calling", "The model can request that your code execute a specific function, then receives the result to continue reasoning.", "tools=[{name:'get_weather', parameters:{...}}]", "Letting the model take real actions: search, calculators, database lookups, API calls", "The model decides WHEN to call a tool and WITH WHAT arguments — your code is responsible for actually executing it and returning the result"),
T("Structured outputs / JSON mode", "Constrains generation so the output is guaranteed to match a schema (not just 'asked nicely').", "response_format={'type':'json_schema', schema:{...}}", "Reliable, code-consumable output without manual parsing/repair", "Support and exact mechanism (grammar-constrained decoding vs. fine-tuned compliance) varies notably by provider"),
T("Multimodal input", "Sending images, audio, or documents alongside text in the same request.", "content=[{type:'image', source:{...}}, {type:'text', text:'Describe this'}]", "Vision tasks, document understanding, audio transcription-adjacent workflows", "Image token cost is usually based on resolution/tile count — large images can be surprisingly expensive"),
T("Embeddings endpoint", "A separate API that returns a vector for input text, rather than generating more text.", "POST /v1/embeddings", "Building the vector representations RAG and semantic search depend on", "Embedding models are versioned and incompatible across versions/providers — re-embed your whole corpus if you switch"),
];
const API_PARAMS = [
Md("model", "model='gpt-4o' / 'claude-opus-4-6' / 'gemini-1.5-pro'", "Selects which specific model handles the request", "Different models trade off cost, speed, and capability — pick per-task, not one model for everything"),
Md("messages", "[{role, content}, ...]", "The conversation history sent to the model", "Most providers require alternating roles and don't auto-manage history — your code keeps and resends the full conversation each call"),
Md("temperature / top_p", "temperature=0.7", "Controls randomness — see the sampling section above", "Defaults differ by provider; don't assume 1.0 always means 'maximum creativity' identically across APIs"),
Md("max_tokens", "max_tokens=1024", "Caps the length of the generated response", "Some providers count this as output-only, others combine input+output against a model's total limit — read the docs per-provider"),
Md("system / system prompt placement", "Anthropic: top-level 'system' param. OpenAI: a 'system' role message.", "Sets persistent behavior/persona for the whole call", "Moving system instructions between providers means restructuring the request, not just renaming a field"),
Md("tools / tool_choice", "tools=[...], tool_choice='auto' | 'required' | {specific tool}", "Controls whether/which tools the model is allowed or forced to call", "tool_choice='required' forces a tool call even when a plain text answer would have been more appropriate — use deliberately"),
Md("stop / stop_sequences", "stop=['\\n\\n']", "Strings that immediately end generation", "Naming differs slightly per provider (stop vs stop_sequences) but the concept is identical"),
];
const API_PROVIDERS = [
T("OpenAI API", "Chat Completions API (and the newer Responses API) — messages in, completion out, broad tool-calling and structured-output support.", "client.chat.completions.create(model='gpt-4o', messages=[...])", "General-purpose tasks, mature tool-calling ecosystem, wide library support", "Two parallel API surfaces (Chat Completions vs. Responses) currently coexist — check which one a given library/example targets"),
T("Anthropic API", "Messages API — similar shape to OpenAI's, with system prompt as a dedicated top-level parameter rather than a message role.", "client.messages.create(model='claude-opus-4-6', system='...', messages=[...])", "Long-context tasks, careful instruction-following, strong tool use", "Anthropic's content blocks (text/tool_use/tool_result) nest slightly differently than OpenAI's flatter message format"),
T("Google Gemini API", "Supports very large context windows and native multimodal (video/audio) input.", "model.generate_content([...])", "Long-document analysis, multimodal tasks beyond just images", "Safety filtering behavior and content-blocking thresholds are more aggressive by default than some other providers — tune safety_settings if legitimately blocked"),
T("Open-source / self-hosted (via Ollama, vLLM, etc.)", "Run open-weight models (Llama, Mistral, Qwen, etc.) locally or on your own infrastructure.", "ollama.chat(model='llama3', messages=[...])", "Data privacy requirements, cost control at high volume, offline/edge use", "Tool-calling and structured-output reliability vary a lot more by model than with the major hosted providers — test thoroughly before relying on it"),
T("Unified/abstraction layers", "Libraries like LangChain or LiteLLM that present one interface over many providers.", "ChatOpenAI(...) and ChatAnthropic(...) share the same .invoke() interface", "Swapping models/providers without rewriting application logic", "Abstraction has a cost: provider-specific features (a particular model's unique parameter) are sometimes unsupported or awkwardly exposed through the common interface"),
];
const API_PRACTICAL = [
T("Retries with backoff", "Automatically retrying a failed request after a delay, increasing the delay on repeated failures.", "exponential backoff: 1s, 2s, 4s, 8s...", "Handling transient rate limits (429) and server errors (5xx) gracefully", "Retrying a non-idempotent side-effecting tool call blindly can cause duplicate actions — only auto-retry safely-repeatable requests"),
T("Rate limits", "Providers cap requests-per-minute and/or tokens-per-minute per account/tier.", "429 Too Many Requests", "Designing for production traffic, not just notebook experiments", "Rate limits often scale with usage tier/spend — a sudden traffic spike on a new account hits limits much sooner than expected"),
T("Cost tracking", "Monitoring token usage and dollar cost per request/feature.", "response.usage.prompt_tokens, .completion_tokens", "Budgeting, identifying which feature/prompt is unexpectedly expensive", "Long conversation histories resent on every call mean cost grows roughly with the SQUARE of conversation length if you're not careful — trim or summarize history"),
T("Caching", "Reusing a previous response (or a cached prefix) instead of recomputing it.", "Anthropic prompt caching, OpenAI's automatic prefix caching", "Repeated calls with a large shared prefix (e.g. a long system prompt or document) across many requests", "Cache hits typically require an exact prefix match — even a tiny change earlier in the prompt invalidates the cached portion"),
T("Error handling by status code", "400 (bad request) vs 401 (auth) vs 429 (rate limit) vs 5xx (server error) need different handling.", "if status==429: backoff_and_retry()", "Robust production integrations instead of a single blanket try/except", "A 400 usually means YOUR request is malformed — retrying it identically will just fail again forever"),
];

/* =========================================================
   GROUP 3 — CHUNKING STRATEGIES
   ========================================================= */
const CHUNK_STRATS = [
T("Fixed-size chunking", "Split text into chunks of a fixed character or token count, often with overlap.", "chunk_size=500, chunk_overlap=50", "Simple, fast baseline; works acceptably on fairly uniform prose", "Can split mid-sentence or mid-table, breaking semantic units arbitrarily at the boundary"),
T("Recursive character splitting", "Try splitting on the largest separator first (paragraphs), falling back to smaller ones (sentences, then words) only if a chunk is still too big.", "separators=['\\n\\n', '\\n', '. ', ' ']", "The most common practical default — respects natural text structure when possible", "Still ultimately falls back to a hard character cutoff if no natural separator is found in time"),
T("Sentence-based chunking", "Split on sentence boundaries, then group sentences up to a target size.", "Using a sentence tokenizer (e.g. NLTK, spaCy) rather than naive period-splitting", "Preserving complete thoughts/sentences as the atomic unit", "Naive '.' splitting breaks on abbreviations ('Dr.', 'U.S.') — use a real sentence tokenizer, not a simple split('.')"),
T("Semantic chunking", "Split based on meaning shifts — measuring embedding similarity between adjacent sentences and cutting where it drops.", "Compute embeddings per sentence, split where cosine similarity dips below a threshold", "Topically coherent chunks, better retrieval relevance on heterogeneous documents", "Computationally more expensive (an embedding call per sentence) than rule-based splitting"),
T("Document-structure-aware chunking", "Split along the document's own structure: markdown headers, HTML tags, code function boundaries.", "MarkdownHeaderTextSplitter, splitting code by function/class", "Structured source documents (docs, code, formatted reports) where structure IS the meaning", "Loses effectiveness on unstructured or inconsistently-formatted source documents"),
T("Sliding window / overlap", "Each chunk shares a portion of text with its neighbor, so context isn't lost exactly at a cut boundary.", "chunk_overlap=50-100 tokens, ~10-20% of chunk_size", "Preventing a key fact from being split exactly across two chunks and lost from both", "Overlap increases total stored chunks (and embedding/storage cost) without adding new information"),
T("Parent-child / hierarchical chunking", "Retrieve using small, precise child chunks, but feed the model the larger parent chunk/section they belong to.", "Embed small chunks for search; return their parent document/section as context", "Balancing precise retrieval with sufficient surrounding context for the LLM to actually use", "Requires maintaining the parent-child mapping in your retrieval system, not just a flat list of chunks"),
];
const CHUNK_TRADEOFFS = [
T("Small chunks (e.g. 100-300 tokens)", "More precise retrieval — less irrelevant text per chunk competing for the model's attention.", "Better for narrow, fact-lookup queries", "FAQ-style Q&A, precise fact retrieval", "Can lose surrounding context needed to correctly interpret an isolated fact (pronouns, prior clauses)"),
T("Large chunks (e.g. 1000+ tokens)", "More context per chunk, fewer total chunks to manage and embed.", "Better for tasks needing broader context to answer well", "Summarization, narrative/argument-following questions", "Dilutes relevance — a chunk can be a marginal match overall even if one sentence inside it is a perfect match, hurting retrieval ranking"),
T("Choosing chunk size in practice", "There's no universal best size — it depends on document type, query type, and embedding model.", "Common starting points: 256–512 tokens, 10-20% overlap", "A reasonable default to start experimenting from, not a final answer", "Always evaluate retrieval quality empirically on YOUR documents and queries rather than trusting a one-size-fits-all default"),
];

/* =========================================================
   GROUP 4 — RAG (RETRIEVAL AUGMENTED GENERATION)
   ========================================================= */
const RAG_PIPELINE = [
T("Ingestion", "Load raw documents, chunk them, embed each chunk, and store the vectors + metadata.", "PDF/HTML/Markdown → chunks → embeddings → vector store", "The one-time (or periodically refreshed) setup phase before any querying happens", "Garbage in, garbage out — poor chunking or a mismatched embedding model silently caps your retrieval quality ceiling regardless of how good the LLM is later"),
T("Query embedding", "The user's question is embedded with the SAME embedding model used for the documents.", "embed(user_query) → query_vector", "Making the query comparable to the stored document vectors", "Using a different embedding model for the query than for the documents produces meaningless similarity scores"),
T("Retrieval", "Find the top-k most similar chunks to the query vector from the vector store.", "vector_store.similarity_search(query_vector, k=5)", "Narrowing a large corpus down to a small, relevant context for the LLM", "Pure similarity search can retrieve chunks that are topically related but don't actually answer the specific question asked"),
T("Augmentation", "Insert the retrieved chunks into the prompt as context, alongside the user's original question.", "'Context: {chunks}\\n\\nQuestion: {query}\\nAnswer using only the context above.'", "Giving the LLM grounded, specific material instead of relying purely on its training data", "Stuffing too many retrieved chunks into the prompt can bury the genuinely relevant one and increase cost/latency for little benefit"),
T("Generation", "The LLM produces an answer conditioned on both the query and the retrieved context.", "llm.invoke(augmented_prompt)", "The final user-facing step of the RAG pipeline", "The LLM can still ignore the provided context and hallucinate, especially if the retrieved chunks don't actually contain the answer"),
];
const RAG_VECTORDB = [
T("Vector database", "A database optimized for storing high-dimensional vectors and performing fast similarity search over millions+ of them.", "Pinecone, Weaviate, Qdrant, Milvus, Chroma, pgvector (Postgres extension), FAISS (library, not a full DB)", "Storing and querying embeddings at any meaningful scale", "FAISS is an in-memory library, not a persistent managed database — fine for prototypes, needs extra work for production durability"),
T("Approximate Nearest Neighbor (ANN)", "Algorithms (HNSW, IVF, etc.) that find very-likely-nearest vectors fast, trading a small amount of exact accuracy for huge speed gains.", "HNSW (Hierarchical Navigable Small World) is the most common modern default", "Making similarity search feasible at scale (millions of vectors) where exact search would be too slow", "ANN is approximate by design — at extreme scale or high precision requirements, occasionally the truly-closest vector is missed"),
T("Cosine similarity", "Measures the angle between two vectors, ignoring their magnitude — the most common metric for text embeddings.", "cos(θ) = (A·B)/(‖A‖‖B‖), ranges -1 to 1", "The default similarity metric for most embedding-based search", "Some embedding models are specifically normalized/trained for dot product instead — check the model's recommended metric rather than assuming cosine always"),
T("Dot product", "Similar to cosine but also sensitive to vector magnitude.", "A·B = Σ(aᵢ·bᵢ)", "When the embedding model was specifically trained/normalized for this metric", "Using the wrong metric for a given embedding model can silently degrade retrieval quality without any obvious error"),
T("Metadata filtering", "Combining vector similarity search with traditional filters on structured fields.", "similarity_search(query, filter={'category':'finance', 'date':{'$gte':'2024-01-01'}})", "Narrowing search within a specific subset (a user's own documents, a date range, a department)", "Over-filtering can return zero results even when relevant documents exist — design filters as a refinement, not the primary search mechanism"),
T("Index updates / freshness", "Keeping the vector store in sync as source documents are added, edited, or deleted.", "Re-embed and upsert changed documents; delete vectors for removed ones", "Any RAG system over documents that change over time, not a static one-time corpus", "Stale embeddings (an old version of a doc still searchable after it was updated) is a very common, hard-to-notice production bug"),
];
const RAG_RETRIEVAL_METHODS = [

/* =========================================================
   RENDER HELPERS
   ========================================================= */
function esc(s){ return (s===undefined||s===null) ? "" : String(s); }

function renderConceptTable(rows){
  let head = "<tr><th>Concept</th><th>What it means</th><th>Example</th><th>When to use</th><th>Gotcha</th></tr>";
  let body = rows.map(r=>`<tr>
      <td class="concept">${esc(r.c)}</td>
      <td>${esc(r.i)}</td>
      <td><span class="codeline" style="margin-top:0">${esc(r.ex)}</span></td>
      <td>${esc(r.u)}</td>
      <td>${esc(r.g)}</td>
    </tr>`).join("");
  return `<div class="twrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}
function renderMethodTable(rows){
  let head = "<tr><th>Name</th><th>Signature</th><th>What it does</th><th>Example / note</th></tr>";
  let body = rows.map(r=>`<tr>
      <td class="concept">${esc(r.m)}</td>
      <td><span class="codeline" style="margin-top:0">${esc(r.sig)}</span></td>
      <td>${esc(r.desc)}</td>
      <td>${esc(r.ex)}</td>
    </tr>`).join("");
  return `<div class="twrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}
function renderGuideTable(rows){
  let head = "<tr><th>Scenario</th><th>Reach for</th></tr>";
  let body = rows.map(r=>`<tr><td>${esc(r.scenario)}</td><td><b>${esc(r.pick)}</b></td></tr>`).join("");
  return `<div class="twrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}
function renderSymptomTable(rows){
  let head = "<tr><th>Symptom</th><th>Likely cause</th></tr>";
  let body = rows.map(r=>`<tr><td>${esc(r.s)}</td><td>${esc(r.cause)}</td></tr>`).join("");
  return `<div class="twrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}

function buildDiagram(key, cap){
  return `<div class="diagram">${DIAG[key]}<div class="cap">${cap||""}</div></div>`;
}
function buildSub(sub){
  let html = `<div class="subsection" id="${sub.id}"><h3>${esc(sub.title)}</h3>`;
  if(sub.note) html += `<p class="note">${esc(sub.note)}</p>`;
  if(sub.diagram) html += buildDiagram(sub.diagram, sub.cap);
  if(sub.table) html += renderConceptTable(sub.table);
  if(sub.table2) html += renderGuideTable(sub.table2);
  if(sub.table3) html += renderSymptomTable(sub.table3);
  html += `</div>`;
  return html;
}
function buildGroup(g){
  let html = `<section class="group" id="${g.id}"><h2>${esc(g.title)}</h2><p class="lede">${esc(g.lede)}</p>`;
  g.subs.forEach(s=> html += buildSub(s));
  if(g.callout) html += `<div class="callout">${g.callout}</div>`;
  html += `</section>`;
  return html;
}
document.getElementById("content").innerHTML = SECTIONS.map(buildGroup).join("");

let navHtml = "";
SECTIONS.forEach(g=>{
  navHtml += `<a class="toplink" href="#${g.id}">${esc(g.title)}</a>`;
  g.subs.forEach(s=> navHtml += `<a class="sublink" href="#${s.id}">${esc(s.title)}</a>`);
});
document.getElementById("navTree").innerHTML = navHtml;

document.getElementById("globalFilter").addEventListener("input", function(e){
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll("table tbody tr").forEach(tr=>{
    if(!q){ tr.classList.remove("row-hidden"); return; }
    const txt = tr.textContent.toLowerCase();
    tr.classList.toggle("row-hidden", !txt.includes(q));
  });
});
